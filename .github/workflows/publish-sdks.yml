name: Publish SDKs

on:
  push:
    branches: [main]
    paths:
      - 'sdks/**'
  workflow_dispatch:

concurrency:
  group: publish-sdks
  cancel-in-progress: true

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      ts-changed: ${{ steps.check.outputs.ts-changed }}
      py-changed: ${{ steps.check.outputs.py-changed }}
      cli-changed: ${{ steps.check.outputs.cli-changed }}
      channel-changed: ${{ steps.check.outputs.channel-changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check which SDKs changed
        id: check
        run: |
          # On workflow_dispatch, publish every SDK (version-exists check still skips no-op re-runs)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ts-changed=true" >> $GITHUB_OUTPUT
            echo "py-changed=true" >> $GITHUB_OUTPUT
            echo "cli-changed=true" >> $GITHUB_OUTPUT
            echo "channel-changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git diff --name-only HEAD~1 HEAD | grep -q '^sdks/typescript/'; then
            echo "ts-changed=true" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only HEAD~1 HEAD | grep -q '^sdks/python/'; then
            echo "py-changed=true" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only HEAD~1 HEAD | grep -q '^sdks/cli-npm/'; then
            echo "cli-changed=true" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only HEAD~1 HEAD | grep -q '^sdks/channel/'; then
            echo "channel-changed=true" >> $GITHUB_OUTPUT
          fi

  publish-typescript:
    needs: check-versions
    if: needs.check-versions.outputs.ts-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install and build
        working-directory: sdks/typescript
        run: npm install && npm run build

      - name: Check if version exists
        id: version-check
        working-directory: sdks/typescript
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.exists == 'false'
        working-directory: sdks/typescript
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    needs: check-versions
    if: needs.check-versions.outputs.py-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build
        working-directory: sdks/python
        run: python -m build

      - name: Check if version exists
        id: version-check
        working-directory: sdks/python
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if pip index versions wago 2>/dev/null | grep -q "${PKG_VERSION}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to PyPI
        if: steps.version-check.outputs.exists == 'false'
        working-directory: sdks/python
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-cli-npm:
    needs: check-versions
    if: needs.check-versions.outputs.cli-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check if version exists
        id: version-check
        working-directory: sdks/cli-npm
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.exists == 'false'
        working-directory: sdks/cli-npm
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-channel:
    needs: check-versions
    if: needs.check-versions.outputs.channel-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install and build
        working-directory: sdks/channel
        run: npm install && npm run build

      - name: Check if version exists
        id: version-check
        working-directory: sdks/channel
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.exists == 'false'
        working-directory: sdks/channel
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
