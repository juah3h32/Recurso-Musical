# TEMPLATE — do not commit with real values.
# Apply with:
#   kubectl create secret generic waha-secret \
#     --from-literal=api-key=<WAHA_API_KEY> \
#     --from-literal=database-url=<SUPABASE_DATABASE_URL>
#
# The api-key is also set as WAHA_API_KEY on the API server so the
# NestJS K8sOrchestrator can authenticate its proxied WAHA requests.
apiVersion: v1
kind: Secret
metadata:
  name: waha-secret
  namespace: default
type: Opaque
stringData:
  api-key: "<WAHA_API_KEY>"
  database-url: "<SUPABASE_DATABASE_URL>"
