name: wago

services:

  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY:-devkey}
      WHATSAPP_DEFAULT_ENGINE: NOWEB
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - waha
      - redis
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      ORCHESTRATOR: local
      WAHA_HOST: waha
      WAHA_PORT: 3000
      WAHA_MAX_SESSIONS: 1
      REDIS_URL: redis://redis:6379
      API_URL: https://api.recursomusical.com.mx
      FRONTEND_URL: https://whatsapp.recursomusical.com.mx
    ports:
      - "3001:3001"
    networks:
      - internal

networks:
  internal:
    driver: bridge
