# WAHA Plus StatefulSet
# Each pod = one WAHA instance, identified by its ordinal (waha-0, waha-1, ...).
# WAHA_WORKER_ID uses the Downward API to set the pod name, isolating session
# storage per pod in Supabase Postgres (each pod's sessions are namespaced by
# worker ID in WAHA's internal tables).
#
# NestJS scales replicas via K8sOrchestrator. The Cluster Autoscaler provisions
# new k3s worker nodes when pods are Pending due to insufficient capacity.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: waha
  namespace: default
spec:
  serviceName: waha      # must match the headless Service name
  replicas: 1            # NestJS controls this; start with 1
  selector:
    matchLabels:
      app: waha
  template:
    metadata:
      labels:
        app: waha
    spec:
      containers:
        - name: waha
          image: devlikeapro/waha-plus:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: WHATSAPP_DEFAULT_ENGINE
              value: NOWEB
            - name: WAHA_MAX_SESSIONS
              value: "50"
            - name: WHATSAPP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: waha-secret
                  key: api-key
            # WAHA_WORKER_ID scopes Postgres session storage per pod.
            # Uses Downward API so each pod gets its own stable namespace.
            - name: WAHA_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name   # resolves to "waha-0", "waha-1", etc.
            - name: WHATSAPP_SESSIONS_POSTGRESQL_URL
              valueFrom:
                secretKeyRef:
                  name: waha-secret
                  key: database-url
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /api/server/version
              port: 3000
              httpHeaders:
                - name: X-Api-Key
                  value: "$(WHATSAPP_API_KEY)"
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12    # 60s total before marking unready
          livenessProbe:
            httpGet:
              path: /api/server/version
              port: 3000
              httpHeaders:
                - name: X-Api-Key
                  value: "$(WHATSAPP_API_KEY)"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          terminationMessagePolicy: FallbackToLogsOnError
      terminationGracePeriodSeconds: 60
